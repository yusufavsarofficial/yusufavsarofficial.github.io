<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Girişi</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Font Awesome ikonları için -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="login-page-body">

    <header id="header-placeholder"></header>

    <main class="login-main">
        <section class="login-section section-padding">
            <div class="container login-container">
                <div id="login-panel" class="glass-panel">
                    <div class="login-header text-center">
                        <div class="logo login-logo"><a href="index.html" style="pointer-events: none;">YUSUF AVŞAR<span class="cursor">_</span></a></div>
                        <h2 class="section-title login-title">Yönetim Paneli</h2>
                        <p class="subsection-description">Erişim için kimlik bilgileri gereklidir.</p>
                    </div>

                    <form id="login-form" class="contact-form" novalidate>
                        <div class="form-group">
                            <label for="password">Parola</label>
                            <div class="password-wrapper">
                                <input type="password" id="password" name="password" required aria-required="true" autocomplete="current-password" aria-label="Parola">
                                <button type="button" id="toggle-password" class="password-toggle-btn" aria-label="Parolayı göster">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full-width" data-original-text="Giriş Yap">Giriş Yap</button>
                    </form>
                    <div id="login-status" class="login-status-message" role="alert" aria-live="polite"></div>
                </div>
                <div class="back-to-home text-center margin-top-md">
                    <a href="index.html" class="footer-links">&larr; Ana Sayfaya Dön</a>
                </div>
            </div>
        </section>
    </main>

    <footer id="footer-placeholder"></footer>

    <script src="assets/js/app.js" defer></script>
    <script src="admin-auth.js" defer></script>
</body>
</html>
