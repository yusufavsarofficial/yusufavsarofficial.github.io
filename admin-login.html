<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Girişi</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-page-body">

    <div class="cursor cursor-dot"></div>
    <div class="cursor cursor-outline"></div>

    <main>
        <section class="login-section">
            <div class="login-container">
                <div id="login-panel" class="glass-panel">
                    <div class="login-header">
                        <div class="logo login-logo"><a href="index.html" style="pointer-events: none;">YUSUF AVŞAR<span class="cursor">_</span></a></div>
                        <h2 class="section-title login-title">Yönetim Paneli</h2>
                        <p class="subsection-description">Erişim için kimlik bilgileri gereklidir.</p>
                    </div>

                    <form id="login-form" class="contact-form">
                        <div class="form-group">
                            <label for="password">Parola</label>
                            <div class="password-wrapper">
                                <input type="password" id="password" name="password" required autocomplete="current-password">
                                <button type="button" id="toggle-password" class="password-toggle-btn" aria-label="Parolayı göster">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full-width" data-original-text="Giriş Yap">Giriş Yap</button>
                    </form>
                    <div id="login-status" class="login-status-message" aria-live="polite"></div>
                </div>
                <div class="back-to-home">
                    <a href="index.html" class="footer-links">&larr; Ana Sayfaya Dön</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Bu sayfa header/footer kullanmadığı için app.js'in sadece ilgili kısımlarını çalıştırırız -->
    <script>
        // Nirvana fare efekti için
        document.addEventListener('DOMContentLoaded', () => {
            const cursorDot = document.querySelector('.cursor-dot');
            const cursorOutline = document.querySelector('.cursor-outline');
            if(cursorDot && cursorOutline) {
                window.addEventListener('mousemove', e => {
                    cursorDot.style.left = `${e.clientX}px`; cursorDot.style.top = `${e.clientY}px`;
                    cursorOutline.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 500, fill: 'forwards' });
                });
            }
        });
    </script>
    <script src="admin-auth.js?v=1.1" defer></script>
</body>

</html>
