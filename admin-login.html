<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Girişi</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-page-body">

    <div class="cursor cursor-dot"></div>
    <div class="cursor cursor-outline"></div>

    <main>
        <section style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
            <div class="container" style="max-width: 450px;">
                <div id="login-panel" class="glass-panel">
                    <div style="text-align: center; margin-bottom: var(--spacing-lg);">
                        <div class="logo" style="font-size: 1.5rem; margin-bottom: var(--spacing-md);"><a href="index.html" style="pointer-events: none;">YUSUF AVŞAR<span class="cursor">_</span></a></div>
                        <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: var(--spacing-xs);">Yönetim Paneli</h2>
                        <p class="subsection-description" style="margin-bottom: 0;">Erişim için kimlik bilgileri gereklidir.</p>
                    </div>

                    <form id="login-form" class="contact-form">
                        <div class="form-group">
                            <label for="password">Parola</label>
                            <div style="position: relative; display: flex; align-items: center;">
                                <input type="password" id="password" name="password" required style="padding-right: 3rem;">
                                <i id="toggle-password" class="fa-solid fa-eye" style="position: absolute; right: 1rem; cursor: pointer; color: var(--color-text-secondary);"></i>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;" data-original-text="Giriş Yap">Giriş Yap</button>
                    </form>
                    <div id="login-status" style="text-align: center; margin-top: var(--spacing-md); color: #ff4d4d;"></div>
                </div>
                <div style="text-align: center; margin-top: var(--spacing-lg);">
                    <a href="index.html" class="footer-links" style="font-size: 0.9rem;">&larr; Ana Sayfaya Dön</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Bu sayfa header/footer kullanmadığı için app.js'in sadece ilgili kısımlarını çalıştırırız -->
    <script>
        // Nirvana fare efekti için
        document.addEventListener('DOMContentLoaded', () => {
            const cursorDot = document.querySelector('.cursor-dot');
            const cursorOutline = document.querySelector('.cursor-outline');
            if(cursorDot && cursorOutline) {
                window.addEventListener('mousemove', e => {
                    cursorDot.style.left = `${e.clientX}px`; cursorDot.style.top = `${e.clientY}px`;
                    cursorOutline.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 500, fill: 'forwards' });
                });
            }
        });
    </script>
    <script src="admin-auth.js?v=1.1" defer></script>
</body>
</html>
