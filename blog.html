<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3063523279693718"
     crossorigin="anonymous"></script>

<body>

    <!-- Nirvana İyileştirmeleri (Fare Efekti) -->

    <div class="cursor cursor-dot"></div>
    <div class="cursor cursor-outline"></div>

    <div id="header-placeholder"></div>

    <main>
        <section>
            <div class="container">
                <div style="text-align: center; margin-bottom: var(--spacing-xl);">

                <div class="filter-buttons scroll-reveal" style="transition-delay: 200ms;">

                    <button class="btn btn-filter" data-filter="gelistirme">Yazılım Geliştirme</button>

                </div>

                    <!-- Blog yazıları buraya dinamik olarak yüklenecek -->
                    <p style="text-align: center; color: var(--color-text-secondary); grid-column: 1 / -1;">Yazılar yükleniyor...</p>
                </div>
            </div>
        </section>

    <div id="footer-placeholder"></div>

    <script src="app.js" defer></script>
