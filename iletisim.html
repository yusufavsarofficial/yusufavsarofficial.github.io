<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf Avşar - İletişim</title>
    <meta name="description" content="Yusuf Avşar ile projenizin güvenlik, geliştirme veya DevSecOps ihtiyaçları hakkında iletişime geçin.">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome ikonları için -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Nirvana İyileştirmeleri (Fare Efekti) -->
    <div class="preloader"><div class="logo"><a href="index.html">YUSUF AVŞAR<span class="cursor">_</span></a></div></div>
    <div class="cursor cursor-dot"></div>
    <div class="cursor cursor-outline"></div>

    <div id="header-placeholder"></div>

    <main>
        <section>
            <div class="container">
                <div style="text-align: center; margin-bottom: var(--spacing-xl);">
                    <h2 class="section-title scroll-reveal">İletişime Geçin</h2>
                    <p class="subsection-description scroll-reveal" style="transition-delay: 100ms;">Projenizin güvenlik, geliştirme veya DevSecOps ihtiyaçlarını tartışmak için aşağıdaki formu doldurabilirsiniz.</p>
                </div>

                <div class="contact-grid">
                    <!-- Sol Sütun: Form -->
                    <div class="glass-panel scroll-reveal" style="transition-delay: 200ms;">
                        <form action="https://formspree.io/f/mleqvjww" method="POST" class="contact-form" id="contact-form">
                            <div class="form-group">
                                <label for="name">Adınız Soyadınız</label>
                                <input type="text" id="name" name="name" required>
                            </div>
                            <div class="form-group">
                                <label for="email">E-posta Adresiniz</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="message">Mesajınız</label>
                                <textarea id="message" name="message" rows="6" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">Mesajı Gönder</button>
                        </form>
                        <div id="form-status"></div>
                    </div>
                    <!-- Sağ Sütun: Alternatif İletişim -->
                    <div class="contact-alternatives scroll-reveal" style="transition-delay: 300ms;">
                        <a href="mailto:yusufavsarofficial@proton.me" class="contact-card" style="text-decoration: none;">
                            <i class="fa-solid fa-envelope"></i>
                            <h3>Doğrudan E-posta</h3>
                            <p>Acil veya detaylı konular için.</p>
                            <span style="color: var(--color-text-primary); font-weight: 500;">yusufavsarofficial@proton.me</span>
                        </a>
                        <div class="contact-card">
                            <i class="fa-brands fa-instagram"></i>
                            <h3>Sosyal Medya</h3>
                            <p>Güncel paylaşımlar ve duyurular için.</p>
                            <a href="https://www.instagram.com/avyusuf95/" target="_blank" rel="noopener noreferrer">Instagram Profilim</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="app.js" defer></script>

</body>
</html>
