<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf Avşar - İletişim</title>
    <meta name="description" content="Yusuf Avşar ile projenizin güvenlik, geliştirme veya DevSecOps ihtiyaçları hakkında iletişime geçin.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main>
        <section>
            <div class="container">
                <div style="text-align: center;">
                    <h2 class="section-title scroll-reveal">İletişime Geçin</h2>
                    <p class="subsection-description scroll-reveal" style="transition-delay: 100ms;">Projenizin güvenlik, geliştirme veya DevSecOps ihtiyaçlarını tartışmak için aşağıdaki formu doldurabilirsiniz.</p>
                </div>

                <div class="glass-panel scroll-reveal" style="transition-delay: 200ms; max-width: 700px; margin: 0 auto;">
                    <form action="https://formspree.io/f/BURAYA_FORMPSREE_KODUNU_YAPISTIR" method="POST" class="contact-form" id="contact-form">
                        <div class="form-group">
                            <label for="name">Adınız Soyadınız</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">E-posta Adresiniz</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Mesajınız</label>
                            <textarea id="message" name="message" rows="6" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Mesajı Gönder</button>
                    </form>
                    <div id="form-status"></div>
                    </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="app.js" defer></script>

</body>
</html>
