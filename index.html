<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistem Bakım Modu | Yusuf Avşar & AYFSOFT</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    :root{ --bg:#050505; --red:#ff0000; }
    html,body{height:100%}
    body{
      font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial;
      background: var(--bg);
      color:#e5e7eb;
      overflow-x:hidden;
    }
    .mono{font-family:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;}
    .bg-grid{
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0);
      background-size: 42px 42px;
    }
    .glass{ background: rgba(10,10,10,0.55); backdrop-filter: blur(14px); }
    .glow-red{ box-shadow: 0 0 70px -22px rgba(255,0,0,0.55); }
    .text-outline{ -webkit-text-stroke: 1px rgba(255,255,255,0.12); color: transparent; }

    #mobileMenu{ transition: transform .6s cubic-bezier(.85,0,.15,1); }

    @keyframes stripes{ from{background-position:40px 0} to{background-position:0 0} }
    .progress-animated{
      background-image: linear-gradient(45deg, rgba(255,255,items-center gap-3 px-4 py-2 bg-red-600/10 border border-red-600/20 rounded-full">
          <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-red-600"></span>
          </span>
          <span class="mono text-[10px] uppercase tracking-widest text-red-500 font-bold">
            Maintenance Protocol v4.0.1
          </span>
        </div>

        <h1 class="text-6xl md:text-8xl font-black uppercase tracking-tighter leading-[0.9] text-white">
          Sistem <span class="text-red-600">Bakım</span><br/>
          <span class="text-outline">Modunda</span>
        </h1>

        <p class="text-zinc-500 text-lg md:text-xl font-light max-w-xl leading-relaxed">
          Altyapı verimliliği ve güvenliği artırmak için kritik servisler kontrollü olarak güncelleniyor.
          Modüller sırayla devreye alınacaktır.
        </p>

        <!-- Progress -->
        <div class="space-y-4 max-w-md">
          <div class="flex justify-between mono text-[10px] uppercase tracking-[0.2em]">
            <span class="text-zinc-400 font-bold">Veritabanı Senkronizasyonu</span>
            <span id="progressLabel" class="text-red-500">16%</span>
          </div>
          <div class="w-full bg-zinc-900 h-2 rounded-full overflow-hidden border border-zinc-800">
            <div id="progressBar"
                 class="h-full bg-red-600 progress-animated shadow-[0_0_18px_rgba(255,0,0,0.45)] transition-all duration-700"
                 style="width:16%"></div>
          </div>

          <div class="mono text-[10px] tracking-[0.25em] uppercase text-zinc-600">
            Node: AYFSOFT-CORE • Status: <span id="statusText" class="text-zinc-400">SYNCING</span> • Uptime:
            <span id="uptime" class="text-zinc-400">00:00:00</span>
          </div>
        </div>
      </section>

      <!-- Right Cards -->
      <aside class="lg:col-span-5 grid grid-cols-1 gap-4">
        <!-- Support -->
        <div id="supportCard" class="p-8 bg-zinc-900/40 border border-zinc-800 rounded-3xl glow-red backdrop-blur-xl hover:border-zinc-700 transition-all">
          <div class="flex items-start justify-between mb-6">
            <i class="fa-solid fa-shield-halved text-4xl text-red-600"></i>
            <span class="mono text-[9px] text-zinc-600 uppercase border border-zinc-800 px-2 py-1 rounded">
              Secure Node
            </span>
          </div>
          <h3 class="mono text-xs font-bold uppercase tracking-widest text-zinc-200 mb-4">Destek Kanalları</h3>
          <div class="space-y-3">
            <a href="mailto:yusufavsarofficial@gmail.com" class="block text-sm text-zinc-500 hover:text-white transition mono">
              yusufavsarofficial@gmail.com
            </a>
            <a href="mailto:yusufavsarofficial@proton.me" class="block text-sm text-zinc-500 hover:text-white transition mono">
              yusufavsarofficial@proton.me
            </a>
          </div>
          <div class="mt-6 flex gap-3">
            <button id="copyMail1" class="px-4 py-2 border border-zinc-800 hover:border-red-600 transition mono text-[10px] tracking-[0.2em] uppercase">
              Gmail Kopyala
            </button>
            <button id="copyMail2" class="px-4 py-2 border border-zinc-800 hover:border-red-600 transition mono text-[10px] tracking-[0.2em] uppercase">
              Proton Kopyala
            </button>
          </div>
        </div>

        <!-- Timeline -->
        <div class="p-8 bg-zinc-900/20 border border-zinc-800 rounded-3xl backdrop-blur-md hover:border-zinc-700 transition-all">
          <div class="flex items-center gap-4 mb-5">
            <i class="fa-solid fa-diagram-project text-blue-500"></i>
            <h3 class="mono text-xs font-bold uppercase tracking-widest text-zinc-200">Bakım Akışı</h3>
            <span class="ml-auto mono text-[9px] tracking-[0.35em] uppercase text-zinc-600 border border-zinc-800 px-2 py-1 rounded">
              LIVE
            </span>
          </div>

          <ol class="space-y-4">
            <li class="flex gap-3 items-start">
              <span id="step1" class="mt-0.5 w-6 h-6 rounded-full border border-zinc-800 grid place-items-center text-zinc-500">
                <i class="fa-solid fa-check text-[11px]"></i>
              </span>
              <div class="grow">
                <div class="flex items-center justify-between">
                  <p class="mono text-[10px] tracking-[0.25em] uppercase text-zinc-300">Backup & Snapshot</p>
                  <p class="mono text-[10px] tracking-[0.25em] uppercase text-zinc-600">DONE</p>
                </div>
                <p class="text-zinc-500 text-sm mt-1">Veri güvenliği için yedekleme ve snapshot tamamlandı.</p>
              </div>
            </li>

            <li class="flex gap-3 items-start">
              <span id="step2" class="mt-0.5 w-6 h-6 rounded-full border border-zinc-800 grid place-items-center text-zinc-500">
                <i class="fa-solid fa-check text-[11px]"></i>
              </span>
              <div class="grow">
                <div class="flex items-center justify-between">
                  <p class="mono text-[10px] tracking-[0.25em] uppercase text-zinc-300">Schema Migration</p>
                  <p id="s2state" class="mono text-[10px] tracking-[0.25em] uppercase text-zinc-600">DONE</p>
                </div>
                <p class="text-zinc-500 text-sm mt-1">Şema güncellemesi uygulanıyor, uyumluluk kontrol ediliyor.</p>
              </div>
            </li>

            <li class="flex gap-3 items-start">
              <span id="step3" class="mt-0.5 w-6 h-6 rounded-full border border-red-600/40 bg-red-600/10 grid place-items-center text-red-500">
                <i class="fa-solid fa-spinner fa-spin text-[11px]"></i>
              </span>
              <div class="grow">
                <div class="flex items-center justify-between">
                  <p class="mono text-[10px] tracking-[0.25em] uppercase text-zinc-300">Data Sync</p>
                  <p id="s3state" class="mono text-[10px] tracking-[0.25em] uppercase text-red-500">IN PROGRESS</p>
                </div>
                <p class="text-zinc-500 text-sm mt-1">Kayıtlar senkronize ediliyor, tutarlılık doğrulanıyor.</p>
              </div>
            </li>

            <li class="flex gap-3 items-start">
              <span id="step4" class="mt-0.5 w-6 h-6 rounded-full border border-zinc-800 grid place-items-center text-zinc-600">
                <i class="fa-solid fa-lock text-[11px]"></i>
              </span>
              <div class="grow">
                <div class="flex items-center justify-between">
                  <p class="mono text-[10px] tracking-[0.25em] uppercase text-zinc-300">Deploy & Unlock</p>
                  <p id="s4state" class="mono text-[10px] tracking-[0.25em] uppercase text-zinc-700">LOCKED</p>
                </div>
                <p class="text-zinc-500 text-sm mt-1">Servisler sırayla açılacak, modüller aktifleşecek.</p>
              </div>
            </li>
          </ol>

          <div class="mt-6 flex items-center justify-between">
            <span class="mono text-[10px] tracking-[0.25em] uppercase text-zinc-600">Last check</span>
            <span id="lastCheck" class="mono text-[10px] tracking-[0.25em] uppercase text-zinc-400">--:--:--</span>
          </div>
        </div>
      </aside>

    </div>
  </main>

  <!-- Footer -->
  <footer class="px-6 py-10 border-t border-zinc-900/50 bg-black/30 backdrop-blur-lg relative z-10">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
      <div class="space-y-2">
        <p class="mono text-[11px] tracking-[0.3em] text-zinc-500">
          &copy; 2010 - 2026 <span class="text-white">YUSUF AVŞAR</span>
        </p>
        <p class="mono text-[11px] tracking-[0.3em] text-zinc-500">
          &copy; 2018 - 2026 <span class="text-white">AYFSOFT PTE</span>
        </p>
      </div>
      <div class="mono text-[10px] text-zinc-600 uppercase tracking-widest">
        Tüm Hakları Saklıdır / All Rights Reserved
      </div>
    </div>
  </footer>

  <!-- Denied Modal -->
  <div id="deniedModal" class="fixed inset-0 z-[200] hidden">
    <div class="absolute inset-0 bg-black/75" data-close="modal"></div>
    <div class="relative max-w-lg mx-auto mt-28 px-6">
      <div class="border border-zinc-800 rounded-3xl glass p-7 glow-red">
        <div class="flex items-start justify-between gap-4">
          <div class="flex items-center gap-3">
            <i class="fa-solid fa-triangle-exclamation text-red-500 text-2xl"></i>
            <div>
              <p class="mono text-[10px] tracking-[0.35em] uppercase text-red-400">Access Denied</p>
              <h3 class="text-xl font-bold text-white mt-1">Erişim Engellendi</h3>
            </div>
          </div>
          <button class="px-3 py-2 border border-zinc-800 hover:border-red-600 transition mono text-[10px] tracking-[0.25em] uppercase"
                  data-close="modal">
            Kapat
          </button>
        </div>
        <p class="text-zinc-400 mt-5 leading-relaxed">
          Sistem bakım modundayken bu alana erişim yetkiniz yok. Modüller bakım sonrası otomatik açılacaktır.
        </p>
        <div class="mt-6 mono text-[10px] tracking-[0.25em] uppercase text-zinc-600">
          Code: <span class="text-zinc-400">AYF-403</span> • Policy: <span class="text-zinc-400">MAINTENANCE_LOCK</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== Helpers
    const $ = (q, root=document) => root.querySelector(q);
    const $$ = (q, root=document) => [...root.querySelectorAll(q)];
    const body = document.body;

    // ===== Menu
    const menuTrigger = $("#menuTrigger");
    const menuLabel = $("#menuLabel");
    const mobileMenu = $("#mobileMenu");
    const menuClose = $("#menuClose");
    const menuBackdrop = $("#menuBackdrop");
    const goSupport = $("#goSupport");

    function lockScroll(lock){ body.style.overflow = lock ? "hidden" : ""; }

    function setMenuOpen(open){
      mobileMenu.classList.toggle("translate-x-full", !open);
      menuTrigger.setAttribute("aria-expanded", String(open));
      menuLabel.textContent = open ? "Kapat" : "Sistem Menüsü";
      lockScroll(open);
    }

    menuTrigger.addEventListener("click", () => {
      const isOpen = menuTrigger.getAttribute("aria-expanded") === "true";
      setMenuOpen(!isOpen);
    });
    menuClose.addEventListener("click", () => setMenuOpen(false));
    menuBackdrop.addEventListener("click", () => setMenuOpen(false));

    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape"){
        setMenuOpen(false);
        closeDenied();
      }
    });

    $$("#mobileMenu [data-action='locked']").forEach(btn => {
      btn.addEventListener("click", () => { setMenuOpen(false); openDenied(); });
    });
    $$("#mobileMenu [data-action='home']").forEach(a => {
      a.addEventListener("click", (e) => { e.preventDefault(); setMenuOpen(false); });
    });
    goSupport?.addEventListener("click", () => {
      setMenuOpen(false);
      $("#supportCard")?.scrollIntoView({behavior:"smooth", block:"center"});
    });

    // ===== Denied Modal
    const deniedModal = $("#deniedModal");
    function openDenied(){ deniedModal.classList.remove("hidden"); lockScroll(true); }
    function closeDenied(){
      if(!deniedModal.classList.contains("hidden")){
        deniedModal.classList.add("hidden");
        lockScroll(false);
      }
    }
    deniedModal.addEventListener("click", (e) => { if(e.target?.dataset?.close === "modal") closeDenied(); });
    $$("[data-close='modal']").forEach(el => el.addEventListener("click", closeDenied));

    // ===== Timeline switch (sync -> deploy)
    const step3 = $("#step3");
    const step4 = $("#step4");
    const s3state = $("#s3state");
    const s4state = $("#s4state");

    function setTimeline(deploying){
      if(deploying){
        step3.className = "mt-0.5 w-6 h-6 rounded-full border border-zinc-800 bg-zinc-900/20 grid place-items-center text-zinc-500";
        step3.innerHTML = '<i class="fa-solid fa-check text-[11px]"></i>';
        s3state.textContent = "DONE";
        s3state.className = "mono text-[10px] tracking-[0.25em] uppercase text-zinc-600";

        step4.className = "mt-0.5 w-6 h-6 rounded-full border border-red-600/40 bg-red-600/10 grid place-items-center text-red-500";
        step4.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-[11px]"></i>';
        s4state.textContent = "IN PROGRESS";
        s4state.className = "mono text-[10px] tracking-[0.25em] uppercase text-red-500";
      } else {
        // default stays syncing (step3 spinner, step4 locked)
        step3.className = "mt-0.5 w-6 h-6 rounded-full border border-red-600/40 bg-red-600/10 grid place-items-center text-red-500";
        step3.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-[11px]"></i>';
        s3state.textContent = "IN PROGRESS";
        s3state.className = "mono text-[10px] tracking-[0.25em] uppercase text-red-500";

        step4.className = "mt-0.5 w-6 h-6 rounded-full border border-zinc-800 grid place-items-center text-zinc-600";
        step4.innerHTML = '<i class="fa-solid fa-lock text-[11px]"></i>';
        s4state.textContent = "LOCKED";
        s4state.className = "mono text-[10px] tracking-[0.25em] uppercase text-zinc-700";
      }
    }

    // ===== Progress (TIME-BASED): 16% start, +1% every 3 hours
    const progressBar = $("#progressBar");
    const progressLabel = $("#progressLabel");
    const statusText = $("#statusText");

    const STEP_MS = 3 * 60 * 60 * 1000;       // 3 hours
    const START_PERCENT = 16;                 // starts at 16%
    const STORAGE_KEY = "ayf_maint_start_ts"; // persists across refresh

    let startTs = Number(localStorage.getItem(STORAGE_KEY));
    if (!startTs || Number.isNaN(startTs)) {
      startTs = Date.now();
      localStorage.setItem(STORAGE_KEY, String(startTs));
    }

    function computePercent(){
      const elapsed = Date.now() - startTs;
      const steps = Math.floor(elapsed / STEP_MS);
      return Math.min(100, START_PERCENT + steps);
    }

    function updateProgressUI(){
      const val = computePercent();
      progressBar.style.width = val + "%";
      progressLabel.textContent = val + "%";
      $("#lastCheck").textContent = new Date().toLocaleTimeString("tr-TR");

      const deploying = val >= 95;
      statusText.textContent = deploying ? "DEPLOYING" : "SYNCING";
      setTimeline(deploying);
    }

    // Initial draw
    updateProgressUI();

    // Update every minute (more than enough)
    setInterval(updateProgressUI, 60 * 1000);

    // ===== Uptime
    const start = Date.now();
    setInterval(() => {
      const s = Math.floor((Date.now() - start) / 1000);
      const hh = String(Math.floor(s / 3600)).padStart(2,"0");
      const mm = String(Math.floor((s % 3600) / 60)).padStart(2,"0");
      const ss = String(s % 60).padStart(2,"0");
      $("#uptime").textContent = `${hh}:${mm}:${ss}`;
    }, 1000);

    // ===== Copy buttons + toast
    let toastEl;
    function openToast(msg){
      if(!toastEl){
        toastEl = document.createElement("div");
        toastEl.className = "fixed bottom-6 left-1/2 -translate-x-1/2 z-[300] px-5 py-3 border border-zinc-800 rounded-full glass mono text-[10px] tracking-[0.25em] uppercase text-zinc-200 transition-opacity";
        toastEl.style.opacity = "0";
        document.body.appendChild(toastEl);
      }
      toastEl.textContent = msg;
      toastEl.style.opacity = "1";
      setTimeout(() => { if(toastEl) toastEl.style.opacity = "0"; }, 1200);
    }

    async function copyText(text){
      try{ await navigator.clipboard.writeText(text); openToast("Kopyalandı"); }
      catch{ openToast("Kopyalanamadı"); }
    }
    $("#copyMail1").addEventListener("click", () => copyText("yusufavsarofficial@gmail.com"));
    $("#copyMail2").addEventListener("click", () => copyText("yusufavsarofficial@proton.me"));

    // ===== Canvas particles (lightweight)
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const canvas = $("#bgCanvas");
    const ctx = canvas.getContext("2d", { alpha: true });

    let W=0, H=0, dpr=1;
    function resize(){
      dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      W = canvas.clientWidth = window.innerWidth;
      H = canvas.clientHeight = window.innerHeight;
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    window.addEventListener("resize", resize, { passive:true });
    resize();

    const particles = [];
    const COUNT = 65;
    function rnd(min,max){ return Math.random()*(max-min)+min; }
    function makeParticle(){
      return {
        x: rnd(0,W), y: rnd(0,H),
        vx: rnd(-0.18, 0.18), vy: rnd(-0.12, 0.12),
        r: rnd(0.8, 2.2),
        a: rnd(0.05, 0.18),
        red: Math.random() < 0.38
      };
    }
    for(let i=0;i<COUNT;i++) particles.push(makeParticle());

    function step(){
      if(reduceMotion) return;
      ctx.clearRect(0,0,W,H);

      const g = ctx.createRadialGradient(W*0.5,H*0.35, 40, W*0.5,H*0.35, Math.max(W,H)*0.75);
      g.addColorStop(0, "rgba(255,0,0,0.06)");
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0,0,W,H);

      for(const p of particles){
        p.x += p.vx; p.y += p.vy;
        if(p.x < -10) p.x = W+10;
        if(p.x > W+10) p.x = -10;
        if(p.y < -10) p.y = H+10;
        if(p.y > H+10) p.y = -10;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = p.red ? `rgba(255,0,0,${p.a})` : `rgba(255,255,255,${p.a})`;
        ctx.fill();
      }
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  </script>
</body>
</html>
