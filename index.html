<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Projesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .active-page { display: block; }
        .locked { cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-slate-800 text-white p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-xl font-bold italic">Logo</div>
            <ul class="flex space-x-4">
                <li><button onclick="showPage('anasayfa')" class="hover:text-blue-400">Anasayfa</button></li>
                <li><button onclick="showPage('hakkimda')" class="hover:text-blue-400">Hakkımda</button></li>
                <li><button onclick="alert('Bu bölüme erişim yetkiniz yok!')" class="locked">Eğitimler 🔒</button></li>
                <li><button onclick="alert('Bu bölüme erişim yetkiniz yok!')" class="locked">Faaliyetler 🔒</button></li>
                <li><button onclick="alert('Bu bölüme erişim yetkiniz yok!')" class="locked">Ürünler 🔒</button></li>
                <li><button onclick="alert('Bu bölüme erişim yetkiniz yok!')" class="locked">Yayınlar 🔒</button></li>
                <li><button onclick="showPage('iletisim')" class="hover:text-blue-400">İletişim</button></li>
            </ul>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-6">

        <section id="anasayfa" class="page active-page text-center py-20 bg-white rounded-lg shadow-lg">
            <h1 class="text-5xl font-bold text-red-600 mb-4">BAKIM MODU AKTİF</h1>
            <p class="text-gray-600 text-xl">Web sitemiz şu anda güncellenmektedir. Lütfen daha sonra tekrar deneyiniz.</p>
            <div class="mt-8">
                <span class="animate-spin inline-block w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full"></span>
            </div>
        </section>

        <section id="hakkimda" class="page bg-white p-8 rounded-lg shadow-lg">
            <h2 class="text-3xl font-bold mb-4 border-b pb-2">Hakkımda</h2>
            <p class="text-gray-700">Burada kişisel bilgileriniz veya şirket geçmişiniz yer alacak.</p>
        </section>

        <section id="iletisim" class="page bg-white p-8 rounded-lg shadow-lg">
            <h2 class="text-3xl font-bold mb-4 border-b pb-2">İletişim</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Adınız" class="w-full p-2 border rounded">
                <textarea placeholder="Mesajınız" class="w-full p-2 border rounded h-32"></textarea>
                <button type="button" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">Gönder</button>
            </form>
        </section>

    </main>

    <script>
        function showPage(pageId) {
            // Tüm sayfaları gizle
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => {
                page.classList.remove('active-page');
            });

            // Seçilen sayfayı göster
            const targetPage = document.getElementById(pageId);
            if (targetPage) {
                targetPage.classList.add('active-page');
            }
        }
    </script>

</body>
</html>
