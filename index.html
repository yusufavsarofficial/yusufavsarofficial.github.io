<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Yusuf Avşar | AYFSOFT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:Inter,system-ui;
      background:#050505;
      color:#e5e7eb;
    }
    .mono{font-family:"JetBrains Mono",monospace}
  </style>
</head>

<body class="min-h-screen overflow-x-hidden">

<!-- HEADER -->
<header class="fixed top-0 left-0 right-0 z-[100] px-6 py-6 flex justify-between items-center">
  <span class="mono text-xs tracking-[0.4em] uppercase text-zinc-500">
    YUSUF AVŞAR | AYFSOFT
  </span>

  <div class="flex items-center gap-4">
    <button id="loginBtn"
      class="mono text-xs tracking-[0.3em] uppercase border border-zinc-700 px-4 py-2
             hover:border-red-600 hover:text-red-500 transition">
      Giriş Yap
    </button>

    <button id="menuTrigger"
      class="mono text-xs tracking-[0.4em] uppercase text-zinc-400 hover:text-red-500 transition">
      Menü
    </button>
  </div>
</header>

<!-- MAIN -->
<main class="pt-36 px-6 max-w-6xl mx-auto space-y-20">

  <h1 class="text-6xl font-black uppercase">
    Dijital Sistemler <span class="text-red-600">Kontrol Altında</span>
  </h1>

</main>

<!-- LOGIN MODAL -->
<div id="loginModal" class="fixed inset-0 z-[200] hidden">
  <div class="absolute inset-0 bg-black/80"></div>

  <div class="relative max-w-md mx-auto mt-40 p-6">
    <div class="border border-zinc-800 bg-black/90 p-8 space-y-4">

      <p class="mono text-xs tracking-[0.35em] uppercase text-red-500">
        AUTH REQUIRED
      </p>

      <h3 class="text-2xl font-black uppercase">Yönetici Girişi</h3>

      <input
        id="passwordInput"
        type="password"
        placeholder="Şifre"
        class="w-full bg-black border border-zinc-700 px-4 py-2 text-zinc-200 focus:outline-none focus:border-red-500"
      >

      <p id="loginError" class="hidden text-red-500 text-sm">
        Yetkin yok.
      </p>

      <button id="loginSubmit"
        class="mono text-xs tracking-[0.3em] uppercase border border-zinc-700 px-4 py-2 hover:border-red-600 transition">
        Giriş Yap
      </button>

    </div>
  </div>
</div>

<!-- JS -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  const loginBtn = document.getElementById("loginBtn");
  const modal = document.getElementById("loginModal");
  const submit = document.getElementById("loginSubmit");
  const input = document.getElementById("passwordInput");
  const error = document.getElementById("loginError");

  // 🔐 SADECE SENİN ŞİFREN (DEĞİŞTİR!)
  const ADMIN_PASSWORD = "AYFSOFT_1905";

  loginBtn.onclick = () => {
    modal.classList.remove("hidden");
    input.value = "";
    error.classList.add("hidden");
  };

  submit.onclick = () => {
    if (input.value === ADMIN_PASSWORD) {
      window.location.href = "admin.html";
    } else {
      error.classList.remove("hidden");
    }
  };

});
</script>

</body>
</html>
