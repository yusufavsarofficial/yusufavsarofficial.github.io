<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistem Bakım Modu | Yusuf Avşar & AYFSOFT</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    :root{ --bg:#050505; --red:#ff0000; }
    html,body{height:100%}
    body{
      font-family:"Inter",system-ui;
      background:var(--bg);
      color:#e5e7eb;
      overflow-x:hidden;
    }
    .mono{font-family:"JetBrains Mono", monospace;}
    .bg-grid{
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.06) 1px, transparent 0);
      background-size:42px 42px;
    }
    .glass{background:rgba(10,10,10,.55);backdrop-filter:blur(14px)}
    #mobileMenu{transition:transform .45s cubic-bezier(.85,0,.15,1)}
    #bgCanvas{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none !important;
    }
  </style>
</head>

<body class="bg-grid min-h-screen">
<canvas id="bgCanvas"></canvas>

<!-- HEADER -->
<header class="fixed top-0 right-0 z-[100] p-6">
  <button id="menuTrigger" class="mono text-xs tracking-[0.4em] uppercase text-zinc-400 hover:text-red-500">
    MENU
  </button>
</header>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="fixed inset-0 z-[90] translate-x-full bg-black/70">
  <div id="menuBackdrop" class="absolute inset-0"></div>

  <aside class="absolute right-0 top-0 h-full w-full md:w-[520px] glass border-l border-zinc-800 p-10">
    <button id="menuClose" class="mono text-xs tracking-[0.3em] text-zinc-400 hover:text-red-500">
      KAPAT
    </button>

    <nav class="mt-16 space-y-6 text-4xl uppercase font-black">
      <a href="index.html" class="block hover:text-red-500">Anasayfa</a>
      <a href="about.html" class="block hover:text-red-500">Hakkımda</a>
      <a href="services.html" class="block hover:text-red-500">Hizmetler</a>
      <a href="projects.html" class="block hover:text-red-500">Projeler</a>
      <a href="contact.html" class="block hover:text-red-500">İletişim</a>
    </nav>
  </aside>
</div>

<!-- MAIN -->
<main class="relative z-10 flex items-center justify-center min-h-screen text-center px-6">
  <div>
    <h1 class="text-6xl md:text-8xl font-black uppercase">
      Sistem <span class="text-red-600">Bakımda</span>
    </h1>
    <p class="mt-6 text-zinc-500 max-w-xl mx-auto">
      Altyapı güncelleniyor. Modüller sırayla açılacaktır.
    </p>
  </div>
</main>

<!-- JS -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  const menuTrigger  = document.getElementById("menuTrigger");
  const mobileMenu   = document.getElementById("mobileMenu");
  const menuClose    = document.getElementById("menuClose");
  const menuBackdrop = document.getElementById("menuBackdrop");

  function openMenu(){
    mobileMenu.classList.remove("translate-x-full");
  }
  function closeMenu(){
    mobileMenu.classList.add("translate-x-full");
  }

  menuTrigger.addEventListener("click", openMenu);
  menuClose.addEventListener("click", closeMenu);
  menuBackdrop.addEventListener("click", closeMenu);

  window.addEventListener("keydown", (e)=>{
    if(e.key === "Escape") closeMenu();
  });

});
</script>

</body>
</html>
