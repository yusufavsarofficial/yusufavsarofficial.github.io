<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf Avşar - Projelerim</title>
    <meta name="description" content="Yusuf Avşar'ın Python, Golang, DevSecOps ve JavaScript alanlarındaki uygulamalı siber güvenlik ve yazılım mimarisi projeleri.">
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3063523279693718"
     crossorigin="anonymous"></script>
</head>
<body>

    <!-- Nirvana İyileştirmeleri (Fare Efekti) -->
    <div class="preloader"><div class="logo"><a href="index.html">YUSUF AVŞAR<span class="cursor">_</span></a></div></div>
    <div class="cursor cursor-dot"></div>
    <div class="cursor cursor-outline"></div>

    <div id="header-placeholder"></div>

    <main>
        <section>
            <div class="container">
                <h2 class="section-title scroll-reveal">Projelerim: Uygulamalı Çalışmalar</h2>

                <!-- Filtre Butonları -->
                <div class="filter-buttons scroll-reveal" style="transition-delay: 100ms;">
                    <button class="btn btn-filter active" data-filter="all">Tümü</button>
                    <button class="btn btn-filter" data-filter="python">Python</button>
                    <button class="btn btn-filter" data-filter="golang">Golang</button>
                    <button class="btn btn-filter" data-filter="devsecops">DevSecOps</button>
                    <button class="btn btn-filter" data-filter="nodejs">Node.js</button>
                    <button class="btn btn-filter" data-filter="react">React</button>
                </div>

                <div class="projects-grid scroll-reveal" style="transition-delay: 200ms;">
                    <!-- Projeler buraya dinamik olarak yüklenecek -->
                    <p style="text-align: center; color: var(--color-text-secondary); grid-column: 1 / -1;">Projeler yükleniyor...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="app.js" defer></script>

</body>
</html>
